<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="#"> Book Store</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active text-white" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="/available_books">
                        Available Books
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="/my_books">
                        My Books
                    </a>
                </li>
            </ul>

            <div>
                <a class="nav-link text-white" href="/book_register">
                    New Book Register
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container my-5 p-5" style="border:1px solid black">

    <h4 class="text-center mb-4">Edit Book Here</h4>

    <form class="col-md-4 offset-md-4"
          th:action="@{/save}"
          method="post" th:object="${book}">
        <input type="hidden" name="id" th:value="${book.id}"/>
        <div class="mb-3">
            <label for="name" class="form-label">Book Name</label>
            <input type="text"
                   class="form-control"
                   id="name"
                   name="name" th:value="book.name">
        </div>

        <div class="mb-3">
            <label for="author" class="form-label">Author</label>
            <input type="text"
                   class="form-control"
                   id="author"
                   name="author" th:value="book.author">
        </div>

        <div class="mb-3">
            <label for="price" class="form-label">Price</label>
            <input type="number"
                   class="form-control"
                   id="price"
                   name="price"
                   step="0.01" th:value="book.price">
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary">
                Edit Book
            </button>
        </div>

    </form>

</div>
<div class="card-footer bg-dark text-white text-center">
    <h5 class="card-title">Special title treatment</h5>
    <p class="card-text">
        With supporting text below as a natural lead-in to additional content.
    </p>
    <a href="#" class="btn btn-primary">Go somewhere</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
